# ── Cortex Agent tool specification ──────────────────────────────
# Passed to the Cortex Agents REST API (see run_agent.py) to define which
# tools the agent can call and how each tool is grounded. Adjust names to
# match your account's database/schema if you changed the defaults in sql/.
name: ap_invoice_agent                                      # agent identifier used by the REST API
description: >                                              # human-readable purpose shown in Snowsight
  Answers natural-language questions about AP spend and invoice aging by
  running governed text-to-SQL against the AP analytics semantic view.

models:
  orchestration: llama3.1-70b                               # model used to plan tool calls and compose the final answer

tools:
  - tool_spec:
      type: cortex_analyst_text_to_sql                       # structured tool: NL question -> governed SQL -> result
      name: ap_semantic_view
      description: >
        Answers quantitative questions about invoices, vendors, amounts,
        due dates, currencies, and approval status using the governed
        AP analytics semantic view.
  - tool_spec:
      type: cortex_search                                     # unstructured tool: semantic search over free-text invoice lines
      name: ap_invoice_search
      description: >
        Finds invoices by fuzzy/semantic matches against their free-text
        line description (e.g. "hydraulic equipment", "PPE"), filterable
        by vendor, approval status, source system, cost center, GL account,
        or PO number.

tool_resources:
  ap_semantic_view:
    semantic_view: coco.semantic.sv_ap_analytics               # fully-qualified semantic view backing this tool
    warehouse: wh_coco_pipeline                                 # warehouse used to execute generated SQL
  ap_invoice_search:
    name: coco.agent.ap_invoice_search                          # fully-qualified Cortex Search service backing this tool
    max_results: 10                                             # cap on returned matches per query
